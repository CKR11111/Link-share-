    <script>
        // BG Particles logic
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        class P {
            constructor() { this.init(); }
            init() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.s = Math.random()*1.2; this.vy = -Math.random()*0.35;
                this.o = Math.random()*0.2;
            }
            up() { this.y += this.vy; if(this.y < -5) this.y = canvas.height+5; }
            dr() { ctx.fillStyle=`rgba(255,255,255,${this.o})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<35; i++) parts.push(new P());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p=>{p.up(); p.dr();}); requestAnimationFrame(anim); }
        anim();

        // Security logic
        function unlock() {
            const pin = document.getElementById('passInput').value;
            // Password change garna yaha "ckr" lai ferera naya rakha:
            if(pin.toLowerCase() === "ckr") {
                document.getElementById('login-screen').classList.add('exit');
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const hub = document.getElementById('main-content');
                    hub.style.display = 'block';
                    setTimeout(() => hub.classList.add('show'), 50);
                }, 600);
            } else {
                const e = document.getElementById('err'); e.style.opacity='1';
                setTimeout(() => e.style.opacity='0', 1800);
            }
        }
        document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key==='Enter') unlock(); });
