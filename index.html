    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        
        body {
            background: #000;
            background-image: radial-gradient(circle at top right, #1a1a2e, #000);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- MINI GLASS LOGIN --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column; /* Stack icons below card */
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 30px;
            padding: 25px;
            width: 75%;
            max-width: 280px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .pass-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            border-radius: 15px;
            padding: 12px;
            color: #fff;
            text-align: center;
            font-size: 15px;
            letter-spacing: 6px;
            margin: 15px 0;
        }

        .unlock-btn {
            background: #fff;
            color: #000;
            font-weight: 800;
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .unlock-btn:active { transform: scale(0.92); }

        /* --- SOCIAL LOGO SECTION --- */
        .social-footer {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }

        .social-footer a {
            color: #fff;
            font-size: 22px;
            transition: 0.3s;
        }

        .social-footer a:active { transform: scale(0.8); color: #3b82f6; }

        /* --- MAIN HUB CONTENT --- */
        #main-content {
            display: none;
            width: 90%;
            max-width: 350px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.8s ease-out;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 35px;
            padding: 10px;
        }

        .links-container {
            max-height: 65vh;
            overflow-y: auto;
            padding: 5px;
            scrollbar-width: none;
        }
        .links-container::-webkit-scrollbar { display: none; }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 8px;
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .link-item:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.1); }

        .link-title { font-size: 14px; font-weight: 500; color: #e2e8f0; }
        .chevron { font-size: 10px; color: rgba(255, 255, 255, 0.1); }

        .hidden-screen { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(0.9); }
    </style>
</head>
<body>

    <script>
        function checkAccess() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('error');
            const loginScreen = document.getElementById('login-screen');
            const mainContent = document.getElementById('main-content');
            
            if (input === "ckrpro") {
                loginScreen.classList.add('hidden-screen');
                mainContent.style.display = 'block';
                setTimeout(() => { 
                    mainContent.style.opacity = '1'; 
                    mainContent.style.transform = 'translateY(0)';
                }, 100);
            } else {
                error.style.opacity = '1';
                document.getElementById('passInput').value = '';
                setTimeout(() => { error.style.opacity = '0'; }, 2000);

        }

        document.getElementById('passInput').addEventListener("keypress", (e) => {

</html>
