<!DOCTYPE html>

    <style>

        body {
            background: #000;
            background-image: radial-gradient(circle at center, #111827, #000);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- COMPACT LOGIN SCREEN --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.6s ease-in-out;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 35px; /* No Border Line */
            padding: 30px 25px;
            width: 80%;
            max-width: 300px; /* Sano size */
            text-align: center;
        }

        .pass-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: none; /* No Border */
            border-radius: 18px;
            padding: 15px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            letter-spacing: 5px;
            margin-top: 20px;
        }

        .unlock-btn {
            background: #3b82f6; /* Premium Blue */
            color: #fff;
            font-weight: 700;
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .unlock-btn:active { transform: scale(0.94); opacity: 0.9; }

        /* --- MAIN CONTENT --- */
        #main-content {
            display: none;
            width: 90%;
            max-width: 350px;
            opacity: 0;
            transition: 0.8s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border-radius: 40px; /* No Border */
            padding: 10px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 8px;
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .link-item:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.1); }

        .link-title { font-size: 14px; font-weight: 500; color: #cbd5e1; }
        .chevron { font-size: 10px; color: rgba(255, 255, 255, 0.1); }

        .hidden-screen { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.1); }
    </style>
</head>
<body>

    <script>
        function checkAccess() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('error');
            const loginScreen = document.getElementById('login-screen');
            const mainContent = document.getElementById('main-content');
