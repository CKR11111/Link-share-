        .scroll-area {

        .link-row:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.1); }
        .row-text { font-size: 15px; font-weight: 500; color: #f1f5f9; }
        .chevron { font-size: 10px; color: rgba(255, 255, 255, 0.2); }

        /* Animation Classes */

        .enter-hub { opacity: 1 !important; transform: translateY(0) !important; }

        .social-box { margin-top: 25px; display: flex; gap: 25px; opacity: 0.5; }
        .social-box a { color: #fff; font-size: 22px; }
    </style>

    <script>
        // --- SUBTLE PARTICLES ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        class P {
            constructor() { this.init(); }
            init() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.s = Math.random()*1.2; this.vy = -Math.random()*0.5;
                this.o = Math.random()*0.3;
            }
            up() { this.y += this.vy; if(this.y < -10) this.y = canvas.height+10; }
            dr() { ctx.fillStyle=`rgba(255,255,255,${this.o})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,6.28); ctx.fill(); }
        }
        for(let i=0; i<50; i++) parts.push(new P());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p=>{p.up(); p.dr();}); requestAnimationFrame(anim); }
        anim();

        // --- UNLOCK ---
        function unlock() {
            const pin = document.getElementById('passInput').value;
            if(pin === "ckrpro") {
                document.getElementById('login-screen').classList.add('exit-login');
                const hub = document.getElementById('main-content');
                hub.style.display = 'block';
                setTimeout(() => hub.classList.add('enter-hub'), 100);
            } else {
                const e = document.getElementById('err'); e.style.opacity='1';
                setTimeout(()=>e.style.opacity='0', 2000);
            }
        }
    </script>
