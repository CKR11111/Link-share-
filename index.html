<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKR PRO HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        
        body {
            background: #000;
            background-image: radial-gradient(circle at center, #1e293b, #000);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            display: flex;
            align-items: center; /* Vertical Center */
            justify-content: center; /* Horizontal Center */
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        /* Standard Glass Box */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-section {
            padding: 25px 0;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Unified Link Style */
        .link-row {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 18px 22px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .link-row:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .link-text {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .chevron-icon {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 9px;
            color: #475569;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="glass-panel">
            
            <div class="header-section">
                <h1 class="brand-name text-white">CKR UNKNOWN</h1>
                <p class="text-[9px] text-blue-500 font-bold tracking-[5px] mt-1 uppercase">Cloud Repository</p>
            </div>

            <div class="links-list">
                <a href="https://tinyurl.com/ckrunknown" target="_blank" class="link-row">
                    <span class="link-text">FF Free Likes</span>
                    <i class="fas fa-chevron-right chevron-icon"></i>
                </a>

                <a href="https://ckrpro-linkshortner.onrender.com/" target="_blank" class="link-row">
                    <span class="link-text">Link Shortner</span>
                    <i class="fas fa-chevron-right chevron-icon"></i>
                </a>

                <a href="https://ckrpro-get-accestoken.onrender.com/" target="_blank" class="link-row">
                    <span class="link-text">Convert Access Token</span>
                    <i class="fas fa-chevron-right chevron-icon"></i>
                </a>

                <a href="https://get-access-token-qax3.onrender.com" target="_blank" class="link-row">
                    <span class="link-text">Get EAT Token</span>
                    <i class="fas fa-chevron-right chevron-icon"></i>
                </a>

                <a href="https://bio-changer-access-token.onrender.com" target="_blank" class="link-row">
                    <span class="link-text">Bio Changer</span>
                    <i class="fas fa-chevron-right chevron-icon"></i>
                </a>

                <a href="https://visit-web-ff.onrender.com" target="_blank" class="link-row">
                    <span class="link-text">FF Visitors</span>
                    <i class="fas fa-chevron-right chevron-icon"></i>
                </a>
            </div>

        </div>

        <p class="footer-text"> </p>
    </div>

</body>
</html>
