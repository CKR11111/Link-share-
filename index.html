<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKR PRO Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: #000;
            background-image: radial-gradient(circle at center, #1a2332, #000);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        /* Glass Look Style */
        .glass-element {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            transition: 0.3s ease;
        }

        .link-row {
            padding: 20px 24px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
        }

        .link-row:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.98);
        }

        .link-name {
            font-size: 15px;
            font-weight: 500;
            color: #f0f0f0;
            letter-spacing: 0.5px;
        }

        .icon-box {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="text-center py-12">
            <h1 class="text-3xl font-bold tracking-tighter text-white">CKR PRO</h1>
            <p class="text-[10px] text-blue-500 uppercase tracking-[5px] mt-2 font-bold">Cloud Repository</p>
        </div>

        <div id="list">
            <a href="https://ckrpro-linkshortner.onrender.com/" target="_blank" class="glass-element link-row block">
                <span class="link-name">Link Shortner</span>
                <i class="fas fa-chevron-right icon-box"></i>
            </a>

            <a href="https://ckrpro-get-accestoken.onrender.com/" target="_blank" class="glass-element link-row block">
                <span class="link-name">Convert Access Token</span>
                <i class="fas fa-chevron-right icon-box"></i>
            </a>

            <a href="https://get-access-token-qax3.onrender.com" target="_blank" class="glass-element link-row block">
                <span class="link-name">Get EAT Token</span>
                <i class="fas fa-chevron-right icon-box"></i>
            </a>
        </div>

        <div class="text-center mt-20">
            <p class="text-[9px] text-gray-600 uppercase tracking-widest">Securely Hosted on Cloud</p>
        </div>
    </div>

</body>
</html>
